version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentrixai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentrixai
      POSTGRES_USER: sentrixai_user
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentrixai_user -d sentrixai']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
