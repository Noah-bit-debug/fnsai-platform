[build]
builder = "nixpacks"
# Compile TypeScript on every deploy. The old command
# ('echo "Using pre-built dist"') assumed a pre-built dist/ was checked
# in, but dist/ is .gitignore'd — Railway was running against a stale
# cached dist that kept some routes out of sync with main.
buildCommand = "npm install --include=dev && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
